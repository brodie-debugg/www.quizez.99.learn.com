<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LEBRON VAULT • Cosmic Unblocked 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-image: url('https://media.giphy.com/media/3o7btPCcdNniyf0ArS/giphy.gif');  /* Animated dark starfield/nebula GIF – looping cosmic stars with motion */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;  /* Keeps it fixed while scrolling */
      min-height: 100vh;
      color: white;
    }
    .content-bg {
      background: rgba(0, 0, 0, 0.65);  /* Semi-transparent dark overlay for readability */
      backdrop-filter: blur(8px);       /* Glassmorphism blur effect */
    }
    .neon-text {
      text-shadow: 0 0 15px #22ff88, 0 0 30px #22ff88, 0 0 45px #22ff88;
    }
    .game-card {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-style: preserve-3d;
      perspective: 1000px;
    }
    .game-card:hover {
      transform: translateY(-12px) rotateX(5deg) rotateY(5deg) scale(1.05);
      box-shadow: 0 0 40px rgba(34, 255, 136, 0.7), 0 20px 40px rgba(0,0,0,0.6);
    }
    .modal {
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    iframe {
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(34, 255, 136, 0.4);
    }
  </style>
</head>
<body>

  <!-- MAIN CONTAINER WITH OVERLAY -->
  <div class="content-bg min-h-screen">

    <!-- HEADER -->
    <header class="border-b border-emerald-900/50 bg-black/60 backdrop-blur-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-2xl font-bold shadow-lg shadow-emerald-500/50">L</div>
          <h1 class="text-3xl font-black tracking-tighter neon-text text-emerald-400">LEBRON VAULT</h1>
        </div>
        
        <div class="flex-1 max-w-xl mx-8">
          <div class="relative">
            <input id="searchInput" 
                   type="text" 
                   placeholder="Search games... (1v1, minecraft, moto, fnaf...)"
                   class="w-full bg-black/70 border border-emerald-700/50 rounded-2xl py-3 px-5 text-lg focus:outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-500/30 placeholder-zinc-400"/>
            <i class="fas fa-search absolute right-5 top-3.5 text-emerald-400/70"></i>
          </div>
        </div>

        <div class="flex items-center gap-6 text-xl">
          <button onclick="randomGame()" class="flex items-center gap-2 hover:text-emerald-300 transition">
            <i class="fas fa-dice-five"></i> <span class="hidden md:inline">Random</span>
          </button>
          <a href="#" class="hover:text-emerald-300 transition"><i class="fas fa-cog"></i></a>
        </div>
      </div>
    </header>

    <div class="max-w-7xl mx-auto flex gap-8 px-6 py-8">

      <!-- SIDEBAR -->
      <div class="w-64 hidden lg:block">
        <div class="sticky top-24">
          <h2 class="text-emerald-400 font-bold text-xl mb-4 flex items-center gap-2"><i class="fas fa-th-large"></i> CATEGORIES</h2>
          <div id="categories" class="space-y-2 text-lg">
            <button onclick="filterCategory('all')" class="cat-btn active w-full text-left px-5 py-3 rounded-2xl bg-black/50 hover:bg-emerald-500/20 border border-emerald-900/30 flex items-center gap-3 transition">All Games</button>
            <button onclick="filterCategory('battle')" class="cat-btn w-full text-left px-5 py-3 rounded-2xl hover:bg-emerald-500/20 border border-emerald-900/30 flex items-center gap-3 transition">Battle / 1v1</button>
            <button onclick="filterCategory('racing')" class="cat-btn w-full text-left px-5 py-3 rounded-2xl hover:bg-emerald-500/20 border border-emerald-900/30 flex items-center gap-3 transition">Racing</button>
            <button onclick="filterCategory('horror')" class="cat-btn w-full text-left px-5 py-3 rounded-2xl hover:bg-emerald-500/20 border border-emerald-900/30 flex items-center gap-3 transition">Horror</button>
            <button onclick="filterCategory('io')" class="cat-btn w-full text-left px-5 py-3 rounded-2xl hover:bg-emerald-500/20 border border-emerald-900/30 flex items-center gap-3 transition">.io Games</button>
            <button onclick="filterCategory('sports')" class="cat-btn w-full text-left px-5 py-3 rounded-2xl hover:bg-emerald-500/20 border border-emerald-900/30 flex items-center gap-3 transition">Sports</button>
          </div>
        </div>
      </div>

      <!-- GAME GRID -->
      <div class="flex-1">
        <div id="gameGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          <!-- JS populates here -->
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div id="gameModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
      <div class="modal bg-black/80 backdrop-blur-xl rounded-3xl max-w-6xl w-full max-h-[95vh] overflow-hidden border border-emerald-500/30 shadow-2xl shadow-emerald-900/50">
        <div class="flex justify-between items-center px-6 py-4 border-b border-emerald-900/50">
          <h2 id="modalTitle" class="text-2xl font-bold neon-text"></h2>
          <button onclick="closeModal()" class="text-3xl hover:text-red-400 transition">×</button>
        </div>
        <div class="p-4">
          <iframe id="modalIframe" class="w-full aspect-video bg-black/90" allowfullscreen></iframe>
        </div>
        <div class="px-6 py-4 flex justify-end gap-4 border-t border-emerald-900/50">
          <button onclick="closeModal()" class="px-8 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-2xl transition">Close</button>
          <button onclick="toggleFullscreen()" class="px-8 py-3 bg-emerald-500 hover:bg-emerald-600 text-black font-bold rounded-2xl flex items-center gap-2 transition">
            <i class="fas fa-expand"></i> Fullscreen
          </button>
        </div>
      </div>
    </div>

  </div>

  <script>
    const games = [
      { title: "1v1.lol", url: "https://sites.google.com/view/html5gamesunblocked/1v1-lol", cat: "battle" },
      { title: "Minecraft Eaglercraft", url: "https://eaglercraft.com/", cat: "battle" },
      { title: "Moto X3M", url: "https://sites.google.com/view/html5gamesunblocked/moto-x3m", cat: "racing" },
      { title: "Five Nights at Epstein's", url: "https://slithergame.io/five-nights-at-epsteins", cat: "horror" },
      { title: "Retro Bowl", url: "https://retro-bowl-unbl0cked.github.io/", cat: "sports" },
      { title: "Monkey Mart", url: "https://monkeymart-online.github.io/", cat: "io" },
      { title: "Slope", url: "https://slope-game.github.io/", cat: "io" },
      { title: "Shell Shockers", url: "https://shellshock.io/", cat: "battle" },
      { title: "Krunker.io", url: "https://krunker.io/", cat: "battle" },
      { title: "Among Us Online", url: "https://www.crazygames.com/embed/among-us-online", cat: "io" },
      // ... add more as needed
    ];

    function renderGames(filteredGames) {
      const grid = document.getElementById('gameGrid');
      grid.innerHTML = '';
      filteredGames.forEach(game => {
        const card = document.createElement('div');
        card.className = `game-card bg-black/40 backdrop-blur-md rounded-3xl overflow-hidden border border-emerald-900/40 cursor-pointer`;
        card.innerHTML = `
          <div class="h-48 bg-black/60 flex items-center justify-center relative">
            <div class="text-7xl opacity-10">${game.title[0]}</div>
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
            <div class="absolute bottom-3 left-3 bg-black/70 text-xs px-3 py-1 rounded-full text-emerald-300">${game.cat.toUpperCase()}</div>
          </div>
          <div class="p-5">
            <h3 class="font-bold text-xl mb-1 neon-text">${game.title}</h3>
            <button onclick="openGame('${game.title}', '${game.url}'); event.stopImmediatePropagation();" 
                    class="mt-4 w-full bg-emerald-600/80 hover:bg-emerald-500 text-black font-bold py-3 rounded-2xl flex items-center justify-center gap-2 transition backdrop-blur-sm">
              <i class="fas fa-play"></i> PLAY NOW
            </button>
          </div>
        `;
        card.onclick = () => openGame(game.title, game.url);
        grid.appendChild(card);
      });
    }

    function openGame(title, url) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalIframe').src = url;
      document.getElementById('gameModal').classList.remove('hidden');
      document.getElementById('gameModal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('modalIframe').src = '';
      document.getElementById('gameModal').classList.add('hidden');
      document.getElementById('gameModal').classList.remove('flex');
    }

    function toggleFullscreen() {
      const iframe = document.getElementById('modalIframe');
      if (iframe.requestFullscreen) iframe.requestFullscreen();
    }

    function filterCategory(cat) {
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.remove('active', 'bg-emerald-500/30');
      });
      event.currentTarget.classList.add('active', 'bg-emerald-500/30');

      let filtered = games;
      if (cat !== 'all') filtered = games.filter(g => g.cat === cat);
      renderGames(filtered);
    }

    function randomGame() {
      const random = games[Math.floor(Math.random() * games.length)];
      openGame(random.title, random.url);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = games.filter(g => g.title.toLowerCase().includes(term));
      renderGames(filtered);
    });

    // Initial render + active class on "All Games"
    document.querySelector('.cat-btn').classList.add('active', 'bg-emerald-500/30');
    renderGames(games);

    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") closeModal();
    });
  </script>

  <p class="text-center text-emerald-300/70 text-sm mt-12 pb-8">
    Lebron's Cosmic Vault • Powered by stars & sneaky mirrors • 2026 edition 😈🪐
  </p>

</body>
</html>
